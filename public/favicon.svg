<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="s" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fff" stop-opacity=".5"/>
      <stop offset="50%" stop-color="#fff" stop-opacity=".05"/>
      <stop offset="100%" stop-color="#001b4d" stop-opacity=".6"/>
    </radialGradient>
  </defs>
  <!-- Base sphere -->
  <circle cx="32" cy="32" r="30" fill="#0f172a" stroke="#FCD116" stroke-width="2"/>
  <!-- Colombia flag bands curved on sphere -->
  <path d="M 2,26 Q 32,20 62,26 L 62,18 Q 32,12 2,18 Z" fill="#FCD116" opacity=".9"/>
  <path d="M 2,38 Q 32,34 62,38 L 62,32 Q 32,28 2,32 Z" fill="#003893" opacity=".85"/>
  <path d="M 2,46 Q 32,42 62,46 L 62,40 Q 32,36 2,40 Z" fill="#CE1126" opacity=".85"/>
  <!-- Soccer ball pentagon seams -->
  <polygon points="32,18 38,24 36,31 28,31 26,24" fill="none" stroke="#FCD116" stroke-width="1" opacity=".5"/>
  <line x1="32" y1="18" x2="32" y2="10" stroke="#FCD116" stroke-width=".8" opacity=".4"/>
  <line x1="38" y1="24" x2="46" y2="22" stroke="#FCD116" stroke-width=".8" opacity=".4"/>
  <line x1="36" y1="31" x2="42" y2="38" stroke="#FCD116" stroke-width=".8" opacity=".4"/>
  <line x1="28" y1="31" x2="22" y2="38" stroke="#FCD116" stroke-width=".8" opacity=".4"/>
  <line x1="26" y1="24" x2="18" y2="22" stroke="#FCD116" stroke-width=".8" opacity=".4"/>
  <!-- 3D shading -->
  <circle cx="32" cy="32" r="30" fill="url(#s)" style="mix-blend-mode:overlay"/>
  <!-- Specular -->
  <circle cx="24" cy="22" r="8" fill="white" opacity=".15"/>
</svg>
